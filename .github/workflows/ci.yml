name: Monorepo CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  be_demo:
    name: be_demo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: be_demo
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore BeDemo.sln
      - run: dotnet format BeDemo.sln --verify-no-changes --no-restore
      - run: dotnet build BeDemo.sln --no-restore -c Release --no-incremental
      - run: dotnet test BeDemo.sln --no-build -c Release --verbosity minimal

  fe_demo:
    name: fe_demo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe_demo
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version-file: 'fe_demo/.nvmrc'

      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn validate
      - run: yarn test
      - run: yarn build

  admin_demo:
    name: admin_demo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin_demo
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version-file: 'admin_demo/.nvmrc'

      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn validate
      - run: yarn test
      - run: yarn build

  ai_demo:
    name: ai_demo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai_demo
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai_demo/requirements.txt

      - name: Install tooling and gRPC deps (no torch)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install ruff pytest grpcio==1.68.1 grpcio-tools==1.68.1 protobuf==5.28.3 grpcio-testing==1.68.1

      - name: Generate protobuf / gRPC stubs
        run: python -m grpc_tools.protoc -I proto --python_out=proto --grpc_python_out=proto proto/health.proto

      - name: Ruff lint + format check
        run: |
          ruff check .
          ruff format --check .

      - name: Unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/ai_demo
        run: pytest test_server.py -q

  infra_db_demo:
    name: infra (db_demo compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate docker compose
        run: docker compose -f db_demo/docker-compose.yml config

  infra_redis_demo:
    name: infra (redis_demo compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate docker compose
        run: docker compose -f redis_demo/docker-compose.yml config

  infra_logger_demo:
    name: infra (logger_demo compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate docker compose
        run: docker compose -f logger_demo/docker-compose.dev.yml config

  monorepo_scripts:
    name: monorepo (ci-local.sh)
    runs-on: ubuntu-latest
    env:
      SKIP_CYPRESS: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version-file: fe_demo/.nvmrc

      - run: corepack enable

      - name: Yarn install (fe_demo + admin_demo)
        run: |
          (cd fe_demo && yarn install --immutable)
          (cd admin_demo && yarn install --immutable)

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Make scripts executable
        run: |
          chmod +x ci-local.sh lint-all.sh build-all.sh test-all.sh
          chmod +x be_demo/lint.sh fe_demo/lint.sh admin_demo/lint.sh ai_demo/lint.sh ai_demo/verify-ci.sh

      - name: Run ci-local.sh (lint-all → build-all → test-all)
        run: ./ci-local.sh
