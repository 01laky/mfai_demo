name: Monorepo CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  be_demo:
    name: be_demo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: be_demo
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore BeDemo.sln
      - run: dotnet format BeDemo.sln --verify-no-changes --no-restore
      - run: dotnet build BeDemo.sln --no-restore -c Release --no-incremental
      - run: dotnet test BeDemo.sln --no-build -c Release --verbosity minimal

  fe_demo:
    name: fe_demo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe_demo
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version-file: 'fe_demo/.nvmrc'

      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn validate
      - run: yarn test
      - run: yarn build

  admin_demo:
    name: admin_demo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin_demo
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version-file: 'admin_demo/.nvmrc'

      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn validate
      - run: yarn test
      - run: yarn build
