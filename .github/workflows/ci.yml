# GitHub Actions — per-submodule jobs run in parallel. Display names use many_faces_* repos;
# working-directory paths remain many_faces_backend/, many_faces_portal/, … `yarn npm audit` / `audit-monorepo-deps.sh` are
# informational (`|| true`) so supply-chain noise does not block merges; fix advisories in follow-ups.
name: Many Faces CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # .NET 10 API + xUnit integration suite (includes SignalR + OAuth regression tests).
  many_faces_backend:
    name: many_faces_backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: many_faces_backend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore BeDemo.sln
      - run: dotnet format BeDemo.sln --verify-no-changes --no-restore
      - run: dotnet build BeDemo.sln --no-restore -c Release --no-incremental
      - run: dotnet test BeDemo.sln --no-build -c Release --verbosity minimal

  # Public Vite/React SPA: lint, unit tests, production build, optional Cypress smoke on `vite preview` (HTTP 4173).
  many_faces_portal:
    name: many_faces_portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: many_faces_portal
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/yarn-spa-ci
        with:
          workspace: many_faces_portal

      - name: Dependency audit (informational)
        run: yarn npm audit || true

      - name: Cypress smoke (built SPA)
        run: |
          yarn preview --host 127.0.0.1 --port 4173 --strictPort &
          PID=$!
          for i in $(seq 1 45); do
            if curl -sf "http://127.0.0.1:4173/" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          yarn test:e2e:ci
          kill $PID || true
          wait $PID 2>/dev/null || true

  many_faces_admin:
    name: many_faces_admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: many_faces_admin
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/yarn-spa-ci
        with:
          workspace: many_faces_admin

      - name: Dependency audit (informational)
        run: yarn npm audit || true

  many_faces_mobile:
    name: many_faces_mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: many_faces_mobile
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Do not use setup-node "cache: yarn" here: it invokes Yarn 1 before Corepack
      # activates Yarn 4 from many_faces_mobile/package.json#packageManager.
      - uses: actions/setup-node@v4
        with:
          node-version-file: many_faces_mobile/.nvmrc

      - name: Enable Corepack (Yarn 4)
        working-directory: many_faces_mobile
        run: corepack enable

      - name: Yarn Berry cache (many_faces_mobile)
        uses: actions/cache@v4
        with:
          path: many_faces_mobile/.yarn/cache
          key: ${{ runner.os }}-yarn-berry-mobile-${{ hashFiles('many_faces_mobile/yarn.lock', 'many_faces_mobile/.yarnrc.yml') }}
          restore-keys: |
            ${{ runner.os }}-yarn-berry-mobile-

      - run: yarn install --immutable

      - name: Make scripts executable
        run: find scripts -maxdepth 1 -name '*.sh' -exec chmod +x {} + 2>/dev/null || true

      - name: Verify (lint + format check + typecheck + test + expo-doctor + audit)
        run: ./scripts/verify-ci.sh --quick

  # Python gRPC demo: protobuf generation, Ruff, pytest. ML stack (CPU torch +
  # transformers) is required so test_server.py can import server.py (same as
  # many_faces_ai/scripts/verify-ci.sh); otherwise the whole module skips and pytest exits 5.
  many_faces_ai:
    name: many_faces_ai
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: many_faces_ai
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: many_faces_ai/requirements.txt

      - name: Install tooling, gRPC deps, and CPU ML stack for tests
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "setuptools<82"
          python -m pip install ruff pytest grpcio==1.68.1 grpcio-tools==1.68.1 protobuf==5.28.3 grpcio-testing==1.68.1
          python -m pip install numpy accelerate "transformers>=4.36" torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Generate protobuf / gRPC stubs
        run: python -m grpc_tools.protoc -I proto --python_out=proto --grpc_python_out=proto proto/health.proto

      - name: Ruff lint + format check
        run: |
          ruff check .
          ruff format --check .

      - name: Unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/many_faces_ai
        run: pytest test_server.py -q

  # Compose syntax checks — catches invalid YAML/env interpolation without starting containers.
  infra_many_faces_database:
    name: infra (many_faces_database)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate docker compose
        run: docker compose -f many_faces_database/docker-compose.yml config

  # Redis compose file sanity (same pattern as many_faces_database).
  infra_many_faces_redis:
    name: infra (many_faces_redis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate docker compose
        run: docker compose -f many_faces_redis/docker-compose.yml config

  infra_many_faces_elastic:
    name: infra (many_faces_elastic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate docker compose
        run: docker compose -f many_faces_elastic/docker-compose.yml config

  # Seq / logger sidecar compose used in local dev stacks.
  infra_many_faces_logger:
    name: infra (many_faces_logger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate docker compose
        run: docker compose -f many_faces_logger/docker-compose.dev.yml config

  # Documentation guard: fenced ```mermaid blocks must parse (see scripts/check-mermaid-docs.sh).
  docs_mermaid:
    name: docs (Mermaid diagrams)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version-file: many_faces_portal/.nvmrc

      - name: Validate fenced Mermaid blocks
        run: |
          chmod +x scripts/check-mermaid-docs.sh
          ./scripts/check-mermaid-docs.sh

  # Cross-language smoke: installs Yarn workspaces + runs scripts/ci-local.sh (lint/build/test matrix).
  monorepo_scripts:
    name: many_faces_main (ci-local.sh)
    runs-on: ubuntu-latest
    env:
      SKIP_CYPRESS: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version-file: many_faces_portal/.nvmrc

      - run: corepack enable

      - name: Yarn install (many_faces_portal + many_faces_admin)
        run: |
          (cd many_faces_portal && yarn install --immutable)
          (cd many_faces_admin && yarn install --immutable)

      - name: Yarn install (many_faces_mobile)
        run: (cd many_faces_mobile && corepack enable && yarn install --immutable)

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Make scripts executable
        run: |
          chmod +x scripts/ci-local.sh scripts/lint-all.sh scripts/build-all.sh scripts/test-all.sh scripts/audit-monorepo-deps.sh
          for d in many_faces_portal many_faces_admin many_faces_backend many_faces_ai many_faces_database many_faces_redis many_faces_elastic many_faces_logger many_faces_mobile; do
            [ -d "$d/scripts" ] && find "$d/scripts" -maxdepth 1 -name '*.sh' -exec chmod +x {} + 2>/dev/null || true
          done

      - name: Monorepo dependency audit (informational)
        run: ./scripts/audit-monorepo-deps.sh

      - name: Run ci-local.sh (lint-all → build-all → test-all)
        run: ./scripts/ci-local.sh
