name: Yarn 4 SPA — install, validate, test, build
description: >
  Shared CI steps for Vite/React submodules (many_faces_portal, many_faces_admin):
  Corepack, immutable Yarn install, validate, unit tests, production build.
  Checkout must run before this composite action.

inputs:
  workspace:
    description: Path from monorepo root (e.g. many_faces_portal)
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node (version from submodule .nvmrc)
      uses: actions/setup-node@v4
      with:
        node-version-file: ${{ inputs.workspace }}/.nvmrc

    - name: Corepack + Yarn install + validate + test + build
      shell: bash
      working-directory: ${{ inputs.workspace }}
      run: |
        set -euo pipefail
        corepack enable
        yarn install --immutable
        yarn validate
        yarn test
        yarn build
