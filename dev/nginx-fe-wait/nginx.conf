worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    error_log     /dev/stderr warn;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Plain HTTP on container :80 → mapped to host 9080 in docker-compose.
    # For editors whose embedded Chromium does not trust mkcert (ERR_CERT_AUTHORITY_INVALID on https://localhost:9081).
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;

        location = /wait.html {
            internal;
            default_type text/html;
            charset utf-8;
        }

        # Same-origin API for Simple Browser: browser → nginx :80 → Kestrel HTTP (no TLS to API in the browser).
        # (?!src/) — otherwise `/src/api/*.ts` (Vite modules) matches [^/]+/(api) and gets proxied to Kestrel → 403 / blank app.
        location ~ ^/(?!src/)[^/]+/(api|hubs)(/.*)?$ {
            resolver 127.0.0.11 valid=10s ipv6=off;
            set $api_upstream be-demo-dev:8000;
            proxy_pass http://$api_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_read_timeout 86400;
        }

        location ~ ^/(api|hubs)(/.*)?$ {
            resolver 127.0.0.11 valid=10s ipv6=off;
            set $api_upstream be-demo-dev:8000;
            proxy_pass http://$api_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_read_timeout 86400;
        }

        location / {
            resolver 127.0.0.11 valid=10s ipv6=off;
            set $vite_upstream fe-demo-dev:8081;
            proxy_pass https://$vite_upstream;
            proxy_ssl_verify off;
            proxy_ssl_server_name off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_read_timeout 86400;
            proxy_intercept_errors on;
            error_page 502 503 504 /wait.html;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/localhost.pem;
        ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

        root /usr/share/nginx/html;

        # Only used via error_page (not reachable from outside).
        location = /wait.html {
            internal;
            default_type text/html;
            charset utf-8;
        }

        # Same-origin API as :80 / 9080: browser talks only to nginx TLS (one mkcert trust); avoids Safari
        # rejecting a second TLS origin (https://localhost:8001) while the SPA is on https://localhost:9081.
        # (?!src/) — otherwise `/src/api/*.ts` (Vite modules) matches [^/]+/(api) and gets proxied to Kestrel → 403 / blank app.
        location ~ ^/(?!src/)[^/]+/(api|hubs)(/.*)?$ {
            resolver 127.0.0.11 valid=10s ipv6=off;
            set $api_upstream be-demo-dev:8000;
            proxy_pass http://$api_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_read_timeout 86400;
        }

        location ~ ^/(api|hubs)(/.*)?$ {
            resolver 127.0.0.11 valid=10s ipv6=off;
            set $api_upstream be-demo-dev:8000;
            proxy_pass http://$api_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_read_timeout 86400;
        }

        location / {
            # 127.0.0.11 = Docker embedded DNS; variable proxy_pass re-resolves after fe-demo-dev restarts.
            resolver 127.0.0.11 valid=10s ipv6=off;
            set $vite_upstream fe-demo-dev:8081;
            proxy_pass https://$vite_upstream;
            proxy_ssl_verify off;
            proxy_ssl_server_name off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_read_timeout 86400;
            proxy_intercept_errors on;
            error_page 502 503 504 /wait.html;
        }
    }
}
