worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    error_log     /dev/stderr warn;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/localhost.pem;
        ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

        root /usr/share/nginx/html;

        # Only used via error_page (not reachable from outside).
        location = /wait.html {
            internal;
            default_type text/html;
            charset utf-8;
        }

        location / {
            # 127.0.0.11 = Docker embedded DNS; variable proxy_pass re-resolves after fe-demo-dev restarts.
            resolver 127.0.0.11 valid=10s ipv6=off;
            set $vite_upstream fe-demo-dev:8081;
            proxy_pass https://$vite_upstream;
            proxy_ssl_verify off;
            proxy_ssl_server_name off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_read_timeout 86400;
            proxy_intercept_errors on;
            error_page 502 503 504 /wait.html;
        }
    }
}
