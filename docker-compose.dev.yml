services:
  # Backend API (be_demo)
  be-demo-dev:
    build:
      context: ./be_demo/BeDemo.Api
      dockerfile: Dockerfile.dev
    container_name: be-demo-dev
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./be_demo/BeDemo.Api:/app
      - be-demo-https:/app/https
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8000
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
      - ConnectionStrings__DefaultConnection=Host=host.docker.internal;Port=5432;Database=bedemo;Username=bedemo_user;Password=bedemo_password
    depends_on:
      seq:
        condition: service_healthy
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/swagger/index.html", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (fe_demo)
  fe-demo-dev:
    build:
      context: ./fe_demo
      dockerfile: Dockerfile.dev
    container_name: fe-demo-dev
    ports:
      - "8081:8081"
    volumes:
      - ./fe_demo:/app
      - fe-demo-node-modules:/app/node_modules
      - fe-demo-yarn-cache:/app/.yarn/cache
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_API_HTTPS_URL=https://localhost:8001
      - VITE_APP_NAME=Fe Demo Frontend
      - VITE_APP_VERSION=1.0.0
      - VITE_PORT=8081
    env_file:
      - ./fe_demo/.env
    depends_on:
      be-demo-dev:
        condition: service_healthy
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Admin Demo (admin_demo)
  admin-demo-dev:
    build:
      context: ./admin_demo
      dockerfile: Dockerfile.dev
    container_name: admin-demo-dev
    ports:
      - "8082:8081"
    volumes:
      - ./admin_demo:/app
      - admin-demo-node-modules:/app/node_modules
      - admin-demo-yarn-cache:/app/.yarn/cache
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_API_HTTPS_URL=https://localhost:8001
      - VITE_APP_NAME=Admin Demo
      - VITE_APP_VERSION=1.0.0
      - VITE_PORT=8081
      - VITE_DEV_PORT=8082
    env_file:
      - ./admin_demo/.env
    depends_on:
      be-demo-dev:
        condition: service_healthy
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Seq Logging Server
  seq:
    image: datalust/seq:latest
    container_name: seq-dev
    ports:
      - "5341:80"
      - "5342:5341"
    environment:
      - ACCEPT_EULA=Y
      # Admin credentials for development
      - SEQ_FIRSTRUN_ADMINUSERNAME=admin
      - SEQ_FIRSTRUN_ADMINPASSWORD=admin
    volumes:
      - seq-data:/data
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # AI Demo gRPC Server
  ai-demo-dev:
    build:
      context: ./ai_demo
      dockerfile: Dockerfile.dev
    container_name: ai-demo-dev
    ports:
      - "50051:50051"
    environment:
      - PORT=50051
    networks:
      - dev-network
    restart: unless-stopped
    depends_on:
      be-demo-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from proto import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50051'); stub = health_pb2_grpc.HealthServiceStub(channel); response = stub.HealthCheck(health_pb2.HealthCheckRequest()); exit(0 if response.status == 'success' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  be-demo-data:
  be-demo-https:
  seq-data:
  fe-demo-node-modules:
  fe-demo-yarn-cache:
  admin-demo-node-modules:
  admin-demo-yarn-cache:

networks:
  dev-network:
    name: mfai_demo_dev-network
    driver: bridge
