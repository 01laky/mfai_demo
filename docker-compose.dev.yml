services:
  # Backend API (many_faces_backend)
  be-demo-dev:
    build:
      context: ./many_faces_backend/BeDemo.Api
      dockerfile: Dockerfile.dev
    container_name: be-demo-dev
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./many_faces_backend/BeDemo.Api:/app
      - ./dev/certs:/https-certs:ro
    # Redis beží v samostatnom repozitári / compose; na hostiteľovi publikuj port 6379 (alebo použi spoločnú Docker sieť).
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_DEV_HTTPS_PFX=/https-certs/localhost.pfx
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
      - ConnectionStrings__DefaultConnection=Host=host.docker.internal;Port=54320;Database=bedemo;Username=bedemo_user;Password=bedemo_password
      # Reference rows come from many_faces_database/seed/sql (see start-all-dev.sh: migrate + seed-after-migrate.sh).
      - Seed__AssumeExternalSqlReferenceApplied=true
      # Redis z many_faces_redis (redis-dev) musí byť na tejto sieti: ./scripts/start-all-dev.sh alebo
      #   docker network connect many_faces_main_dev-network redis-dev
      - Redis__Configuration=redis-dev:6379,abortConnect=false
      # Optional many_faces_push: set ENABLE_PUSH_WORKER=1 and see dev/push-dev.env.example. Compose substitutes ${PUSH_DEV_*} when exporting from start-all-dev.sh.
      - Push__Enabled=${PUSH_DEV_ENABLED:-false}
      - Push__WorkerGrpcUrl=${PUSH_DEV_WORKER_GRPC_URL:-}
      - Push__WorkerAuthToken=${PUSH_DEV_WORKER_AUTH_TOKEN:-}
      - Push__WorkerTlsServerCaPath=${PUSH_DEV_WORKER_TLS_SERVER_CA_PATH:-}
      - Push__WorkerTlsClientCertPath=${PUSH_DEV_WORKER_TLS_CLIENT_CERT_PATH:-}
      - Push__WorkerTlsClientKeyPath=${PUSH_DEV_WORKER_TLS_CLIENT_KEY_PATH:-}
      - Push__WorkerGrpcTlsServerName=${PUSH_DEV_WORKER_GRPC_TLS_SERVER_NAME:-}
      # Optional many_faces_mailer: set ENABLE_MAILER_WORKER=1; compose substitutes ${MAIL_DEV_*} from start-all-dev.sh.
      - Mail__Enabled=${MAIL_DEV_ENABLED:-false}
      - Mail__WorkerGrpcUrl=${MAIL_DEV_WORKER_GRPC_URL:-}
      - Mail__WorkerAuthToken=${MAIL_DEV_WORKER_AUTH_TOKEN:-}
      - Mail__WorkerTlsServerCaPath=${MAIL_DEV_WORKER_TLS_SERVER_CA_PATH:-}
      - Mail__WorkerTlsClientCertPath=${MAIL_DEV_WORKER_TLS_CLIENT_CERT_PATH:-}
      - Mail__WorkerTlsClientKeyPath=${MAIL_DEV_WORKER_TLS_CLIENT_KEY_PATH:-}
      - Mail__WorkerGrpcTlsServerName=${MAIL_DEV_WORKER_GRPC_TLS_SERVER_NAME:-}
      # Optional many_faces_elastic (ENABLE_ELASTICSEARCH=1). Backend uses gRPC only (no Elasticsearch HTTP from the API). Example:
      # - Search__Enabled=true
      # - Search__WorkerGrpcUrl=http://search-worker-dev:50052
      # - Search__WorkerAuthToken=   # optional; must match SEARCH_WORKER_EXPECTED_TOKEN on the worker when set
    depends_on:
      seq:
        condition: service_healthy
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/swagger/index.html || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (many_faces_portal)
  fe-demo-dev:
    build:
      context: ./many_faces_portal
      dockerfile: Dockerfile.dev
    container_name: fe-demo-dev
    # Vite listens on 8081 only inside the network; host uses fe-demo-proxy → 9081 (wait page until Vite is up).
    expose:
      - "8081"
    volumes:
      - ./many_faces_portal:/app
      - ./dev/certs:/certs:ro
      - fe-demo-node-modules:/app/node_modules
      - fe-demo-yarn-cache:/app/.yarn/cache
    environment:
      - VITE_API_URL=https://localhost:8001
      - VITE_API_HTTPS_URL=https://localhost:8001
      - VITE_APP_NAME=Many Faces Portal
      - VITE_APP_VERSION=1.0.0
      - VITE_PORT=8081
      - VITE_DEV_CERT_DIR=/certs
      - VITE_SEQ_PROXY_TARGET=http://seq:5341
    env_file:
      - ./many_faces_portal/.env
    depends_on:
      be-demo-dev:
        condition: service_healthy
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate --spider https://127.0.0.1:8081/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Cold named volume: yarn install (esbuild, etc.) can take several minutes before Vite listens.
      start_period: 600s

  # HTTPS reverse proxy: always serves something on host 9081 — static wait page + auto-refresh while Vite is down.
  fe-demo-proxy:
    image: nginx:1.27-alpine
    container_name: fe-demo-proxy
    ports:
      - "9081:443"
    volumes:
      - ./dev/nginx-fe-wait/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dev/nginx-fe-wait/wait.html:/usr/share/nginx/html/wait.html:ro
      - ./dev/certs:/etc/nginx/certs:ro
    depends_on:
      - fe-demo-dev
    networks:
      - dev-network
    restart: unless-stopped

  # Many Faces Admin (many_faces_admin)
  admin-demo-dev:
    build:
      context: ./many_faces_admin
      dockerfile: Dockerfile.dev
    container_name: admin-demo-dev
    ports:
      - "8082:8081"
    volumes:
      - ./many_faces_admin:/app
      - ./dev/certs:/certs:ro
      - admin-demo-node-modules:/app/node_modules
      - admin-demo-yarn-cache:/app/.yarn/cache
    environment:
      - VITE_API_URL=https://localhost:8001
      - VITE_API_HTTPS_URL=https://localhost:8001
      - VITE_APP_NAME=Many Faces Admin
      - VITE_APP_VERSION=1.0.0
      - VITE_PORT=8081
      - VITE_DEV_CERT_DIR=/certs
    env_file:
      - ./many_faces_admin/.env
    depends_on:
      be-demo-dev:
        condition: service_healthy
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate --spider https://127.0.0.1:8081/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Seq Logging Server
  seq:
    image: datalust/seq:latest
    container_name: seq-dev
    ports:
      - "5341:80"
      - "5342:5341"
    environment:
      - ACCEPT_EULA=Y
      # Admin credentials for development
      - SEQ_FIRSTRUN_ADMINUSERNAME=admin
      - SEQ_FIRSTRUN_ADMINPASSWORD=admin
    volumes:
      - seq-data:/data
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/api || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Many Faces AI gRPC Server (independent - no dependency on backend)
  ai-demo-dev:
    build:
      context: ./many_faces_ai
      dockerfile: Dockerfile.dev
    container_name: ai-demo-dev
    ports:
      - "50051:50051"
    volumes:
      - ai-demo-hf-cache:/root/.cache/huggingface
    environment:
      - PORT=50051
      - HF_HOME=/root/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: 10G
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from proto import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50051'); stub = health_pb2_grpc.HealthServiceStub(channel); response = stub.HealthCheck(health_pb2.HealthCheckRequest()); exit(0 if response.status == 'success' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

volumes:
  be-demo-data:
  seq-data:
  fe-demo-node-modules:
  fe-demo-yarn-cache:
  admin-demo-node-modules:
  admin-demo-yarn-cache:
  ai-demo-hf-cache:

networks:
  dev-network:
    name: many_faces_main_dev-network
    driver: bridge
